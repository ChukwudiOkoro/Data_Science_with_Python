<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fastAOI Calculator</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="calculator-shell">
    <div class="calculator-header">
      <div>
        <p class="subheading">fastAOI</p>
        <h1>Scientific Calculator</h1>
      </div>
      <button id="clear" type="button">Reset</button>
    </div>

    <section class="display-panel">
      <div id="expression" class="expression"></div>
      <div id="result" class="result">0</div>
    </section>

    <section class="button-grid">
      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button data-value="/">÷</button>
      <button data-value="sqrt(">√</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button data-value="*">×</button>
      <button data-value="^">^</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="-">−</button>
      <button data-value="(">()</button>

      <button data-value="0">0</button>
      <button data-value=".">.</button>
      <button id="calculate" class="accent">=</button>
      <button data-value="+">+</button>
      <button data-value=","> , </button>

      <button data-value="sin(">sin</button>
      <button data-value="cos(">cos</button>
      <button data-value="tan(">tan</button>
      <button data-value="log(">ln</button>
      <button data-value="log10(">log10</button>

      <button data-value="pi">π</button>
      <button data-value="e">e</button>
      <button data-value="exp(">exp</button>
      <button data-value="abs(">abs</button>
      <button data-value="pow(">pow</button>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
